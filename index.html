<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pavan — Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
--bg: #07080a;
--surface: #0e1014;
--border: rgba(255,255,255,0.07);
--accent: #c9a96e;
--accent2: #7c6fcd;
--text: #e8e4dc;
--muted: #6b6a67;
--serif: 'Playfair Display', Georgia, serif;
--sans: 'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; }

body {
background: var(--bg);
color: var(--text);
font-family: var(--sans);
font-weight: 300;
overflow-x: hidden;
cursor: default;
}

/* NOISE */
body::before {
content: '';
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
opacity: 0.025;
pointer-events: none;
z-index: 9999;
}

/* NAV */
nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
padding: 24px 48px;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 1px solid transparent;
transition: border-color 0.4s, background 0.4s;
}

nav.scrolled {
border-color: var(--border);
background: rgba(7,8,10,0.85);
backdrop-filter: blur(16px);
}

.nav-logo {
font-family: var(--serif);
font-size: 22px;
letter-spacing: 0.02em;
color: var(--text);
}

.nav-logo span { color: var(--accent); }

.nav-links {
display: flex;
gap: 36px;
list-style: none;
}

.nav-links a {
font-size: 13px;
font-weight: 400;
letter-spacing: 0.12em;
text-transform: uppercase;
color: var(--muted);
text-decoration: none;
transition: color 0.3s;
}

.nav-links a:hover { color: var(--text); }

/* HERO */
.hero {
min-height: 100vh;
display: grid;
grid-template-columns: 1fr 1fr;
position: relative;
overflow: hidden;
}

.hero-left {
display: flex;
flex-direction: column;
justify-content: center;
padding: 120px 64px 80px 80px;
position: relative;
z-index: 2;
}

.hero-eyebrow {
font-size: 11px;
letter-spacing: 0.25em;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 28px;
display: flex;
align-items: center;
gap: 12px;
}

.hero-eyebrow::before {
content: '';
width: 32px;
height: 1px;
background: var(--accent);
}

h1 {
font-family: var(--serif);
font-size: clamp(52px, 6vw, 88px);
font-weight: 700;
line-height: 1.05;
letter-spacing: -0.02em;
margin-bottom: 12px;
}

h1 em {
font-style: italic;
color: var(--accent);
}

.hero-sub {
font-size: 16px;
color: var(--muted);
line-height: 1.7;
max-width: 420px;
margin-bottom: 48px;
font-weight: 300;
}

.hero-cta-row {
display: flex;
gap: 16px;
align-items: center;
}

.btn-primary {
display: inline-flex;
align-items: center;
gap: 10px;
padding: 14px 28px;
background: var(--accent);
color: #07080a;
font-family: var(--sans);
font-size: 13px;
font-weight: 500;
letter-spacing: 0.06em;
text-transform: uppercase;
text-decoration: none;
border: none;
cursor: pointer;
transition: opacity 0.3s, transform 0.3s;
}

.btn-primary:hover { opacity: 0.85; transform: translateY(-2px); }

.btn-ghost {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 14px 28px;
border: 1px solid var(--border);
color: var(--muted);
font-family: var(--sans);
font-size: 13px;
font-weight: 400;
letter-spacing: 0.06em;
text-transform: uppercase;
text-decoration: none;
transition: border-color 0.3s, color 0.3s;
}

.btn-ghost:hover { border-color: var(--muted); color: var(--text); }

/* HERO RIGHT */
.hero-right {
position: relative;
overflow: hidden;
}

.hero-photo-placeholder {
width: 100%;
height: 100%;
}

.hero-img {
width: 100%;
height: 100%;
object-fit: cover;
transition: transform 1.5s ease, filter 1s ease;
filter: brightness(0.85) contrast(1.05);
}

.hero-right:hover .hero-img {
transform: scale(1.05);
filter: brightness(1) contrast(1.1);
}

.hero-right-overlay {
position: absolute;
inset: 0;
background: linear-gradient(to right, var(--bg) 0%, transparent 30%);
}

/* BADGE */
.hero-badge {
position: absolute;
bottom: 60px;
right: 48px;
background: var(--surface);
border: 1px solid var(--border);
padding: 20px 24px;
width: 200px;
animation: float 6s ease-in-out infinite;
z-index: 3;
}

@keyframes float {
0%, 100% { transform: translateY(0); }
50% { transform: translateY(-10px); }
}

.hero-badge-label {
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 6px;
}

.hero-badge-text {
font-family: var(--serif);
font-size: 15px;
color: var(--text);
line-height: 1.4;
}

/* SCROLL */
.scroll-hint {
position: absolute;
bottom: 40px;
left: 80px;
display: flex;
align-items: center;
gap: 12px;
font-size: 11px;
letter-spacing: 0.2em;
text-transform: uppercase;
color: var(--muted);
z-index: 5;
}

.scroll-line {
width: 1px;
height: 48px;
background: var(--muted);
position: relative;
overflow: hidden;
}

.scroll-line::after {
content: '';
position: absolute;
top: -100%;
width: 100%;
height: 100%;
background: var(--accent);
animation: scrollDown 2s ease-in-out infinite;
}

@keyframes scrollDown {
0% { top: -100%; }
100% { top: 100%; }
}

/* (बाकी code SAME hai — About, Timeline, Footer unchanged) */
</style>
</head>

<body>

<nav id="nav">
<div class="nav-logo">P<span>.</span>avan</div>
<ul class="nav-links">
<li><a href="#about">About</a></li>
<li><a href="#journey">Journey</a></li>
<li><a href="#connect">Connect</a></li>
</ul>
</nav>

<section class="hero">
<div class="hero-left">
<div class="hero-eyebrow fade-up visible">Engineer & Civil Servant</div>
<h1 class="fade-up visible">Pavan<br><em>Meena</em></h1>
<p class="hero-sub fade-up visible">
NIT Kurukshetra graduate, serving the Government of India.
</p>
</div>

<div class="hero-right">
<div class="hero-photo-placeholder">
<img src="your-photo.jpg" class="hero-img">
</div>
<div class="hero-right-overlay"></div>

<div class="hero-badge">
<div class="hero-badge-label">Currently</div>
<div class="hero-badge-text">Government of India<br>Ranchi, Jharkhand</div>
</div>
</div>

<div class="scroll-hint">
<div class="scroll-line"></div>
Scroll
</div>
</section>

<script>
const nav = document.getElementById('nav');
window.addEventListener('scroll', () => {
nav.classList.toggle('scrolled', window.scrollY > 40);
});
</script>

</body>
</html>
